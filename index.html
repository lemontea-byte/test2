<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>32 Tile Puzzle Challenge</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    overflow-x:hidden;
    position:relative;

    /* Your uploaded image */
    background:url("background.png") center center/cover no-repeat fixed;
}

/* Dark overlay for readability */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    z-index:-2;
}

/* Neon overlay mode */
body.neon::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(
            135deg,
            rgba(255,0,255,0.20),
            rgba(0,255,255,0.20),
            rgba(57,255,20,0.20),
            rgba(255,255,0,0.20)
        );
    background-size:400% 400%;
    animation:glowBg 8s infinite alternate;
    pointer-events:none;
    z-index:-1;
}

@keyframes glowBg{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

h1{
    color:white;
    margin-bottom:15px;
    text-shadow:0 0 20px rgba(255,255,255,.9);
}

.info{
    display:flex;
    gap:25px;
    margin-bottom:15px;
    color:white;
    font-size:1.2rem;
    font-weight:bold;
    text-shadow:0 0 10px black;
}

#puzzle{
    width:540px;
    height:450px;
    display:grid;
    grid-template-columns:repeat(8,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:4px;
}

.tile{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(5px);
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:1.2rem;
    font-weight:bold;
    transition:.2s;
    user-select:none;
}

.tile:hover{
    transform:scale(1.05);
}

body.neon .tile{
    background:rgba(10,10,10,0.9);
    color:#00ffff;
    border:2px solid #00ffff;
    box-shadow:
        0 0 8px #00ffff,
        0 0 15px #00ffff,
        0 0 25px #00ffff;
}

.empty{
    background:transparent !important;
    border:none !important;
    box-shadow:none !important;
}

.controls{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:1rem;
    font-weight:bold;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

#message{
    margin-top:15px;
    color:white;
    font-size:1.3rem;
    font-weight:bold;
    text-align:center;
    text-shadow:0 0 10px black;
}

@media(max-width:700px){

    #puzzle{
        width:95vw;
        height:80vw;
    }

    .tile{
        font-size:.9rem;
    }

    .info{
        flex-direction:column;
        gap:8px;
        align-items:center;
    }
}
</style>
</head>

<body>

<h1>🧩 32 Tile Puzzle Challenge</h1>

<div class="info">
    <div>⏱ Time: <span id="timer">00:00</span></div>
    <div>🎯 Moves: <span id="moves">0</span></div>
</div>

<div id="puzzle"></div>

<div class="controls">
    <button onclick="shuffleBoard()">🔀 Shuffle</button>
    <button onclick="toggleTheme()">🌈 Toggle Neon</button>
</div>

<div id="message"></div>

<script>

const COLS = 8;
const ROWS = 4;
const TOTAL = 32;

const puzzle = document.getElementById("puzzle");
const timerText = document.getElementById("timer");
const moveText = document.getElementById("moves");
const message = document.getElementById("message");

let board = [];

for(let i=1;i<TOTAL;i++){
    board.push(i);
}
board.push(0);

let moves = 0;
let seconds = 0;
let timerRunning = false;
let timer;

function startTimer(){

    if(timerRunning) return;

    timerRunning = true;

    timer = setInterval(()=>{
        seconds++;

        const mins = Math.floor(seconds/60);
        const secs = seconds%60;

        timerText.textContent =
            String(mins).padStart(2,"0") + ":" +
            String(secs).padStart(2,"0");
    },1000);
}

function resetTimer(){

    clearInterval(timer);

    timerRunning = false;
    seconds = 0;

    timerText.textContent = "00:00";
}

function render(){

    puzzle.innerHTML = "";

    board.forEach((value,index)=>{

        const tile = document.createElement("div");

        if(value === 0){

            tile.className = "tile empty";

        }else{

            tile.className = "tile";
            tile.textContent = value;

            tile.addEventListener("click",()=>moveTile(index));
        }

        puzzle.appendChild(tile);
    });

    checkWin();
}

function moveTile(index){

    startTimer();

    const emptyIndex = board.indexOf(0);

    const row = Math.floor(index / COLS);
    const col = index % COLS;

    const emptyRow = Math.floor(emptyIndex / COLS);
    const emptyCol = emptyIndex % COLS;

    const adjacent =
        (Math.abs(row-emptyRow)===1 && col===emptyCol) ||
        (Math.abs(col-emptyCol)===1 && row===emptyRow);

    if(adjacent){

        [board[index],board[emptyIndex]] =
        [board[emptyIndex],board[index]];

        moves++;
        moveText.textContent = moves;

        render();
    }
}

function shuffleBoard(){

    for(let i=0;i<2000;i++){

        const emptyIndex = board.indexOf(0);

        const neighbors = [];

        const row = Math.floor(emptyIndex / COLS);
        const col = emptyIndex % COLS;

        if(row>0) neighbors.push(emptyIndex - COLS);
        if(row<ROWS-1) neighbors.push(emptyIndex + COLS);
        if(col>0) neighbors.push(emptyIndex - 1);
        if(col<COLS-1) neighbors.push(emptyIndex + 1);

        const random =
            neighbors[Math.floor(Math.random()*neighbors.length)];

        [board[emptyIndex],board[random]] =
        [board[random],board[emptyIndex]];
    }

    moves = 0;
    moveText.textContent = "0";

    resetTimer();

    message.textContent = "";

    render();
}

function toggleTheme(){
    document.body.classList.toggle("neon");
}

function checkWin(){

    for(let i=0;i<TOTAL-1;i++){

        if(board[i] !== i+1){
            return;
        }
    }

    if(board[TOTAL-1] === 0){

        clearInterval(timer);

        message.innerHTML =
            "🏆 You Solved the 32 Tile Puzzle!<br>" +
            "⏱ Time: " + timerText.textContent +
            " | 🎯 Moves: " + moves;
    }
}

render();

</script>

</body>
</html>
